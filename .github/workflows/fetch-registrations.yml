name: Fetch Registrations

on:
  schedule:
    - cron: '0 5 * * *'   # dagelijks 05:00 UTC (07:00 zomertijd)
  workflow_dispatch:        # ook handmatig te starten

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch registrations
        run: node scripts/fetch-registrations.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/registrations.json
          git diff --cached --quiet || git commit -m "chore: update registrations data"
          git push

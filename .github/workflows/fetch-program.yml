name: Fetch Program

on:
  schedule:
    - cron: '30 5 * * *'   # dagelijks 05:30 UTC (07:30 zomertijd)
  workflow_dispatch:        # ook handmatig te starten

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch program from roundtexel.com
        run: node scripts/fetch-program.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/schedule.json
          git diff --cached --quiet || git commit -m "chore: update program data"
          git push
